<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Party Game</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);
color:white;
text-align:center;
}

.screen{display:none;padding:20px;}
.active{display:block;}

.card{
margin:20px auto;
padding:30px;
border-radius:20px;
max-width:400px;
font-size:22px;
font-weight:bold;
}

.easy{background:#ffb6c1;color:black;}
.medium{background:#ffe066;color:black;}
.hard{background:#7a001f;color:white;}

button{
padding:15px;
margin:10px;
border:none;
border-radius:15px;
font-size:18px;
width:80%;
cursor:pointer;
}

.start{background:#00e676;}
.draw{background:#2979ff;color:white;}
.done{background:#00c853;color:white;}
.veto{background:#ff1744;color:white;}

input,select{
padding:10px;
margin:5px;
width:80%;
border-radius:10px;
border:none;
}
</style>
</head>

<body>

<div id="setup" class="screen active">
<h2>🎉 Party Game</h2>
<div id="players"></div>
<button class="start" onclick="startGame()">התחל</button>
</div>

<div id="game" class="screen">
<h2 id="turn"></h2>

<button class="draw" onclick="draw()">🎲 שלוף</button>

<div id="card" class="card" style="display:none;"></div>

<div id="actions" style="display:none;">
<button class="done" onclick="done()">בוצע</button>
<button class="veto" onclick="veto()">וטו</button>
</div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>

// 🔴 שים פה את ה-config שלך מ-Firebase
// Import the functions you need from the SDKs you need
import { initializeApp } from "firebase/app";
import { getAnalytics } from "firebase/analytics";
// TODO: Add SDKs for Firebase products that you want to use
// https://firebase.google.com/docs/web/setup#available-libraries

// Your web app's Firebase configuration
// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyDhwqIq4Rh3b4P1thyiW4pPdg-TFMyn0PM",
  authDomain: "couple-party-84158.firebaseapp.com",
  databaseURL: "https://couple-party-84158-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "couple-party-84158",
  storageBucket: "couple-party-84158.firebasestorage.app",
  messagingSenderId: "436769750713",
  appId: "1:436769750713:web:673f3233bd3109fdf26568",
  measurementId: "G-6RDE147RR6"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);
const analytics = getAnalytics(app);
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let players=[];
let current=0;
let taskData=null;

// יצירת שחקנים
for(let i=0;i<4;i++){
document.getElementById("players").innerHTML+=`
<input id="p${i}" placeholder="שם שחקן ${i+1}">
<select id="g${i}">
<option value="male">בן</option>
<option value="female">בת</option>
</select>
`;
}

function startGame(){
players=[];
for(let i=0;i<4;i++){
players.push({
name:document.getElementById("p"+i).value||"שחקן"+(i+1),
gender:document.getElementById("g"+i).value
});
}

document.getElementById("setup").classList.remove("active");
document.getElementById("game").classList.add("active");

updateTurn();
}

function updateTurn(){
document.getElementById("turn").innerText =
"🎯 התור של " + players[current].name;
}

// 🔥 קריאה מהענן
async function getTasks(){
let doc = await db.collection("game").doc("tasks").get();
return doc.exists ? doc.data() : {};
}

function parse(text){
let p = players[current];
let males = players.filter(x=>x.gender==="male");
let females = players.filter(x=>x.gender==="female");

let r = arr => arr[Math.floor(Math.random()*arr.length)]?.name || "";

return text
.replaceAll("{current}",p.name)
.replaceAll("{random}",players[Math.floor(Math.random()*players.length)].name)
.replaceAll("{male}",r(males))
.replaceAll("{female}",r(females))
.replaceAll("{all_males}",males.map(x=>x.name).join(", "))
.replaceAll("{all_females}",females.map(x=>x.name).join(", "));
}

async function draw(){
let tasks = await getTasks();

let cats=["easy","medium","hard"];
let cat=cats[Math.floor(Math.random()*cats.length)];

let list = tasks[cat] || [];
let raw = list[Math.floor(Math.random()*list.length)];

if(!raw){alert("אין משימות");return;}

taskData={text:raw,cat:cat};

let card=document.getElementById("card");
card.style.display="block";
card.className="card "+cat;
card.innerText=parse(raw);

document.getElementById("actions").style.display="block";
}

function done(){
next();
}

function veto(){
if(taskData.cat==="hard") alert("🥃🥃 שני שוטים");
else alert("🥃 שוט אחד");
next();
}

function next(){
current++;
if(current>=players.length) current=0;

updateTurn();
document.getElementById("card").style.display="none";
document.getElementById("actions").style.display="none";
}

</script>

</body>
</html>
