<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>

<style>
body{
font-family:Arial;
background:#111;
color:white;
padding:20px;
}

.section{
padding:15px;
margin-bottom:20px;
border-radius:15px;
}

.easy{background:#ffb6c1;color:black;}
.medium{background:#ffe066;color:black;}
.hard{background:#7a001f;color:white;}

textarea{
width:100%;
height:50px;
margin:5px 0;
border-radius:10px;
border:none;
padding:10px;
}

button{
padding:15px;
border:none;
border-radius:10px;
background:#00e676;
font-size:18px;
cursor:pointer;
width:100%;
}
</style>
</head>

<body>

<h1>⚙️ אדמין - משימות</h1>

<div class="section easy"><h2>קל</h2><div id="easy"></div></div>
<div class="section medium"><h2>בינוני</h2><div id="medium"></div></div>
<div class="section hard"><h2>קשה</h2><div id="hard"></div></div>

<button onclick="save()">שמור</button>

<script>

["easy","medium","hard"].forEach(cat=>{
for(let i=0;i<10;i++){
document.getElementById(cat).innerHTML+=
`<textarea id="${cat}${i}" placeholder="{current} / {random} / {male} / {female}"></textarea>`;
}
});

function save(){
let data={easy:[],medium:[],hard:[]};

for(let c of ["easy","medium","hard"]){
for(let i=0;i<10;i++){
data[c].push(document.getElementById(c+i).value);
}
}

localStorage.setItem("tasks",JSON.stringify(data));
alert("נשמר!");
}

</script>

</body>
</html>
